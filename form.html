<!DOCTYPE html>
<html lang="fr">
<head>
  
    <title>Acceil</title>
    <style>

        body {
            padding: 0;
        }

        header {
            background-color: #f4f4f4;
            padding: 20px;
            align-items: center;
        }

        header img {
            width: 60px;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
        }

        .container {
            padding: 20px;
        }

        .cards {
            margin-bottom: 30px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 15px;
            width: 50%;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: auto;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #333;
            color: white;
        }

        form {
            border: 1px solid #ccc;
            padding: 20px;
            max-width: 400px;
        }

        form div {
            margin-bottom: 15px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" alt="Logo">
        <h1>Bienvenue sur notre site</h1>
    </header>

    <nav>
        <a href="acceil.html">Acceil</a>
        <a href="formations.html">Formations</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">

        <div class="cards">
            <div class="card">
                <img src="image1.jpg" alt="Formation 1">
                <h3>Formation Web</h3>
                <p>Apprenez les bases du développement web.</p>
                <a href="#">En savoir plus</a>
            </div>

            <div class="card">
                <img src="image2.jpg" alt="Formation 2">
                <h3>Formation Design</h3>
                <p>Découvrez les principes du design graphique.</p>
                <a href="#">En savoir plus</a>
            </div>
        </div>

        <form>
            <div>
                <label>Nom complet :</label><br>
                 <select name="formation">
                    <option> votre nom</option>
                </select>
            </div>

            <div>
                <label>Adresse électronique :</label><br>
                 <select name="formation">
                    <option> votre email</option>
                </select>
            </div>

            <div>
                <label>Choisir une formation :</label><br>
                <select name="formation">
                    <option> Développement Web</option>
                </select>
            </div>

            <button type="submit">S'inscrire</button>
        </form>

    </div>

    <footer>
        <p>© 2026 - Tous droits réservés</p>
    </footer>

</body>
</html>
